name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: python -m compileall -q spark quality simulator

      - name: Check shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Check executable script permissions
        run: |
          missing=0
          while IFS= read -r -d '' file; do
            if [ ! -x "$file" ]; then
              echo "not executable: $file"
              missing=1
            fi
          done < <(find scripts -name '*.sh' -print0)
          exit "$missing"
